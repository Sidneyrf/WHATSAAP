<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Funnel - WhatsApp Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .chat-header {
            background: #075E54;
            color: white;
            padding: 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            gap: 12px;
        }

        .header-left {
            flex: 0 0 auto;
        }

        .header-center {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right {
            flex: 0 0 auto;
            display: flex;
            gap: 8px;
        }

        .back-btn, .header-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .back-btn:hover, .header-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: bold;
            color: white;
            font-size: 20px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .contact-info h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.9;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #25D366;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .message {
            display: flex;
            animation: messageIn 0.3s ease-out;
            margin-bottom: 4px;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            display: inline-block;
        }

        .message.bot .message-bubble {
            background: #e5ddd5;
            color: #000;
            border-radius: 0 18px 18px 18px;
        }

        .message.user .message-bubble {
            background: #dcf8c6;
            color: #000;
            border-radius: 18px 0 18px 18px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px;
            background: #e5ddd5;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .payment-panel {
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            padding: 16px;
            display: none;
        }

        .payment-panel.active {
            display: block;
        }

        .payment-content {
            background: white;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e5e5e5;
        }

        .payment-content h3 {
            color: #075E54;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .payment-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .pix-key-box {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pix-key-box code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            flex: 1;
        }

        .copy-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #20ba5a;
        }

        .submit-receipt-btn {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-receipt-btn:hover {
            background: #20ba5a;
        }

        .chat-input-area {
            padding: 12px 16px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            background: white;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        .input-field:focus {
            border-color: #25D366;
        }

        .send-btn {
            background: #25D366;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #20ba5a;
        }

        @media (max-width: 600px) {
            .chat-container {
                max-width: 100%;
                height: 100vh;
            }
            
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <button class="back-btn">←</button>
            </div>
            <div class="header-center">
                <div class="contact-avatar">💬</div>
                <div class="contact-info">
                    <h2>Chat Bot</h2>
                    <span class="status-indicator">
                        <span class="status-dot"></span>
                        Online
                    </span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn">☎️</button>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Payment Panel -->
        <div class="payment-panel" id="paymentPanel">
            <div class="payment-content">
                <h3>Pagamento via PIX</h3>
                <p>Escaneie o código ou copie a chave:</p>
                
                <div class="pix-key-box">
                    <code id="pixKey">12345.67890 12345.678901 12345.678 123456789012</code>
                    <button class="copy-btn" onclick="copyPixKey()">Copiar</button>
                </div>

                <button class="submit-receipt-btn" onclick="submitReceipt()">Enviar Comprovante</button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Digite sua mensagem..." 
                class="input-field"
            >
            <button class="send-btn" onclick="sendMessage()">→</button>
        </div>
    </div>

    <script>
        const messages = [
            { type: 'text', text: 'Olá! 👋 Bem-vindo ao nosso chat', from: 'bot', delay: 1000 },
            { type: 'text', text: 'Tenho uma oferta especial para você hoje', from: 'bot', delay: 2000 },
            { type: 'typing', from: 'bot', delay: 1500 },
            { type: 'text', text: 'Por apenas R$ 97, você ganha acesso a nosso sistema completo 🎁', from: 'bot', delay: 2000 },
            { type: 'text', text: 'Quer aproveitar essa oportunidade?', from: 'bot', delay: 2000 },
            { type: 'typing', from: 'bot', delay: 1500 },
            { type: 'text', text: 'Para prosseguir, faça o pagamento via PIX', from: 'bot', delay: 2000 },
            { type: 'payment', text: '💳 Envie o comprovante do PIX', from: 'bot', delay: 1000 }
        ];

        let messageQueue = [...messages];
        let isProcessing = false;

        function displayMessage(message) {
            const chatMessages = document.getElementById('chatMessages');
            
            if (message.type === 'text') {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.from === 'bot' ? 'bot' : 'user'}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = message.text;
                
                messageDiv.appendChild(bubble);
                chatMessages.appendChild(messageDiv);
            } 
            else if (message.type === 'typing') {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message bot';
                
                const bubble = document.createElement('div');
                bubble.className = 'typing-indicator';
                
                for (let i = 0; i < 3; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'typing-dot';
                    bubble.appendChild(dot);
                }
                
                messageDiv.appendChild(bubble);
                chatMessages.appendChild(messageDiv);
            }
            else if (message.type === 'payment') {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message bot';
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = message.text;
                
                messageDiv.appendChild(bubble);
                chatMessages.appendChild(messageDiv);
                
                document.getElementById('paymentPanel').classList.add('active');
            }
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function processMessageQueue() {
            if (messageQueue.length === 0 || isProcessing) return;
            
            isProcessing = true;
            const message = messageQueue.shift();
            
            setTimeout(() => {
                displayMessage(message);
                
                if (messageQueue.length > 0) {
                    const nextMessage = messageQueue[0];
                    const delay = nextMessage.delay || 2000;
                    setTimeout(() => {
                        isProcessing = false;
                        processMessageQueue();
                    }, delay);
                } else {
                    isProcessing = false;
                }
            }, message.delay || 0);
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            document.getElementById('chatMessages').appendChild(messageDiv);
            
            input.value = '';
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        function copyPixKey() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                alert('Chave PIX copiada!');
            });
        }

        function submitReceipt() {
            alert('Comprovante recebido! Redirecionando...');
            setTimeout(() => {
                document.getElementById('paymentPanel').classList.remove('active');
                
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message bot';
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = '✅ Pagamento confirmado com sucesso!';
                
                messageDiv.appendChild(bubble);
                document.getElementById('chatMessages').appendChild(messageDiv);
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            }, 1500);
        }

        // Iniciar chat
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Começar processamento de mensagens quando página carrega
        window.addEventListener('load', () => {
            processMessageQueue();
        });
    </script>
</body>
</html>
